<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>排球場預約與揪團系統</title>
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js'></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; padding: 20px; background-color: #f4f7f6; }
        .container { max-width: 1000px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .hidden { display: none; }
        .auth-box { text-align: center; margin-top: 100px; }
        input, select { padding: 8px; margin: 5px; border-radius: 4px; border: 1px solid #ccc; }
        button { padding: 10px 15px; border: none; border-radius: 4px; background-color: #4CAF50; color: white; cursor: pointer; }
        button:hover { background-color: #45a049; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }

        /* 快速預約工具列樣式 */
        .booking-bar { background-color: #e9ecef; padding: 15px; border-radius: 6px; margin-bottom: 15px; display: flex; align-items: center; gap: 10px; }
        #calendar { margin-top: 20px; }
    </style>
</head>
<body>

    <div id="auth-section" class="auth-box">
        <h2>🏐 校園排球場預約系統</h2>
        <input type="text" id="student_id" placeholder="請輸入學號" required>
        <input type="password" id="password" placeholder="請設定或輸入密碼" required>
        <br><br>
        <button onclick="login()">登入</button>
        <button onclick="register()" style="background-color: #008CBA;">註冊新帳號</button>
    </div>

    <div id="app-section" class="container hidden">
        <div class="header">
            <h2 id="welcome-msg">歡迎！</h2>
            <button onclick="logout()" style="background-color: #f44336;">登出</button>
        </div>

        <div class="booking-bar">
            <strong>⚡ 快速預約：</strong>
            <input type="date" id="book-date">
            <select id="book-hour">
                <option value="">選擇時間</option>
                <option value="9">09:00</option>
                <option value="10">10:00</option>
                <option value="11">11:00</option>
                <option value="12">12:00</option>
                <option value="13">13:00</option>
                <option value="14">14:00</option>
                <option value="15">15:00</option>
                <option value="16">16:00</option>
                <option value="17">17:00</option>
                <option value="18">18:00</option>
                <option value="19">19:00</option>
                <option value="20">20:00</option>
            </select>
            <select id="book-court">
                <option value="A場">A場</option>
                <option value="B場">B場</option>
            </select>
            <button onclick="manualBook()" style="background-color: #ff9800;">送出預約</button>
        </div>

        <p>💡 <strong>操作說明：</strong> 點擊空白處預約；點擊方塊加入/退出揪團。若格子被擋住，請使用上方的「快速預約」。</p>
        <div id='calendar'></div>
    </div>

    <script>
        const API_BASE = 'http://127.0.0.1:5000/api';
        let currentStudentId = null;
        let calendar;

        async function register() {
            const student_id = document.getElementById('student_id').value;
            const password = document.getElementById('password').value;
            if(!student_id || !password) return alert("請輸入學號與密碼！");
            const res = await fetch(`${API_BASE}/register`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ student_id, password }) });
            alert((await res.json()).message);
        }

        async function login() {
            const student_id = document.getElementById('student_id').value;
            const password = document.getElementById('password').value;
            if(!student_id || !password) return alert("請輸入學號與密碼！");
            const res = await fetch(`${API_BASE}/login`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ student_id, password }) });
            const data = await res.json();
            if (res.ok) {
                currentStudentId = data.student_id;
                document.getElementById('auth-section').classList.add('hidden');
                document.getElementById('app-section').classList.remove('hidden');
                document.getElementById('welcome-msg').innerText = `🏐 歡迎，${currentStudentId}！`;
                initCalendar();
            } else alert(data.message);
        }

        function logout() { location.reload(); }

        // ==========================================
        // 新增：快速預約工具列的發送邏輯
        // ==========================================
        async function manualBook() {
            const date = document.getElementById('book-date').value;
            const hour = document.getElementById('book-hour').value;
            const court = document.getElementById('book-court').value;

            if (!date || !hour || !court) return alert("請完整選擇日期、時間與場地！");

            const dateObj = new Date(date);
            const day = dateObj.getDay();
            const h = parseInt(hour);

            if (day === 0 || day === 6) {
                if (h < 13 || h >= 19) return alert('❌ 假日僅開放 13:00 到 19:00 預約喔！');
            } else {
                if (h < 9 || h >= 21) return alert('❌ 平日僅開放 09:00 到 21:00 預約喔！');
            }

            const res = await fetch(`${API_BASE}/reservations`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ student_id: currentStudentId, court_name: court, date: date, hour: h })
            });
            alert((await res.json()).message);
            loadReservations();
        }

        function initCalendar() {
            const calendarEl = document.getElementById('calendar');
            calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'timeGridWeek',
                slotMinTime: '09:00:00',
                slotMaxTime: '21:00:00',
                allDaySlot: false,
                height: 650,
                businessHours: [
                    { daysOfWeek: [ 1, 2, 3, 4, 5 ], startTime: '09:00', endTime: '21:00' },
                    { daysOfWeek: [ 0, 6 ], startTime: '13:00', endTime: '19:00' }
                ],

                dateClick: async function(info) {
                    const dateObj = new Date(info.date);
                    const day = dateObj.getDay();
                    const hour = dateObj.getHours();

                    if (day === 0 || day === 6) {
                        if (hour < 13 || hour >= 19) return alert('❌ 假日僅開放 13:00 到 19:00 預約喔！');
                    } else {
                        if (hour < 9 || hour >= 21) return alert('❌ 平日僅開放 09:00 到 21:00 預約喔！');
                    }

                    const dateStr = dateObj.getFullYear() + '-' + String(dateObj.getMonth() + 1).padStart(2, '0') + '-' + String(dateObj.getDate()).padStart(2, '0');
                    const court = prompt(`您選擇了 ${dateStr} 的 ${hour}:00 時段。\n請輸入要預約的場地 (輸入 A場 或 B場):`);
                    if (!court) return;

                    const res = await fetch(`${API_BASE}/reservations`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ student_id: currentStudentId, court_name: court, date: dateStr, hour: hour })
                    });
                    alert((await res.json()).message);
                    loadReservations();
                },

                // ==========================================
                // 更新：點擊事件判斷 (加入 或 退出)
                // ==========================================
                eventClick: async function(info) {
                    const resId = info.event.extendedProps.reservation_id;
                    const participantsCount = info.event.extendedProps.participants_count;
                    const courtName = info.event.extendedProps.court_name;
                    const participantList = info.event.extendedProps.participants; // 抓取名單

                    // 如果現在的使用者已經在名單內，顯示「退出」選項
                    if (participantList.includes(currentStudentId)) {
                        if (confirm(`你已經在【${courtName}】的揪團中。\n確定要退出揪團（或取消預約）嗎？\n⚠️ 註：若你是最後一人，退出將會自動釋放該場地。`)) {
                            const res = await fetch(`${API_BASE}/reservations/${resId}/leave`, {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({ student_id: currentStudentId })
                            });
                            alert((await res.json()).message);
                            loadReservations();
                        }
                    }
                    // 如果不在名單內，顯示「加入」選項
                    else {
                        if (confirm(`【${courtName}】目前有 ${participantsCount}/14 人。\n確定要加入這個揪團嗎？`)) {
                            const res = await fetch(`${API_BASE}/reservations/${resId}/join`, {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({ student_id: currentStudentId })
                            });
                            alert((await res.json()).message);
                            loadReservations();
                        }
                    }
                }
            });

            calendar.render();
            loadReservations();
        }

        async function loadReservations() {
            const res = await fetch(`${API_BASE}/reservations`);
            const data = await res.json();

            calendar.removeAllEvents();

            data.forEach(item => {
                const startDateTime = `${item.date}T${String(item.hour).padStart(2, '0')}:00:00`;
                const endDateTime = `${item.date}T${String(item.hour + 1).padStart(2, '0')}:00:00`;

                const isFull = item.participants_count >= 14;
                let eventColor = '#4CAF50';

                if (item.court_name.includes('B') || item.court_name.includes('b')) {
                    eventColor = '#f44336';
                } else if (item.court_name.includes('A') || item.court_name.includes('a')) {
                    eventColor = '#4CAF50';
                }

                if (isFull) eventColor = '#9e9e9e';
                let fullText = isFull ? '(已滿團)' : `(${item.participants_count}/14人)`;

                // 新增一個前綴標記，如果自己有參加，顯示一個小星星 ⭐
                let myPrefix = item.participants.includes(currentStudentId) ? '⭐ ' : '';

                calendar.addEvent({
                    title: `${myPrefix}${item.court_name} ${fullText}`,
                    start: startDateTime,
                    end: endDateTime,
                    color: eventColor,
                    extendedProps: {
                        reservation_id: item.id,
                        participants_count: item.participants_count,
                        court_name: item.court_name,
                        participants: item.participants // 把名單存入日曆事件中
                    }
                });
            });
        }
    </script>
</body>
</html>
